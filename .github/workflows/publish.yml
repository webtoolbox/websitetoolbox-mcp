name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - run: |
          rm -f ~/.npmrc
          npm publish --access public --provenance

  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Prepare bundle directory
        run: |
          mkdir -p bundle/server
          cp dist/index.js bundle/server/
          cp dist/client.js bundle/server/
          cp package.json bundle/
          cp -r node_modules bundle/
          cp manifest.json bundle/
          cp icon.png bundle/

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Pack MCPB bundle
        run: |
          cd bundle
          mcpb pack
          mv bundle.mcpb ../websitetoolbox-mcp.mcpb

      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "websitetoolbox-mcp.mcpb" \
            --repo "${{ github.repository }}"
