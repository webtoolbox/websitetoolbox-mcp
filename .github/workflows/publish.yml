name: Publish to npm & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'  # Node 24+ ships npm ≥ 11.5.1 required for OIDC
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm publish --access public

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  bundle:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci
      - run: npm run build

      - name: Prepare bundle directory
        run: |
          mkdir -p bundle/server
          cp dist/index.js bundle/server/
          cp dist/client.js bundle/server/
          cp package.json bundle/
          cp -r node_modules bundle/
          cp manifest.json bundle/
          cp icon.png bundle/

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Pack MCPB bundle
        run: |
          cd bundle
          mcpb pack
          mv bundle.mcpb ../websitetoolbox-mcp.mcpb

      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "websitetoolbox-mcp.mcpb" \
            --repo "${{ github.repository }}"
